name: Publish Docker image

# Build and push the unraid-mcp image to Docker Hub for a given MCP version.
#
# This workflow does NOT trigger on pushed tags: Changesets pushes its release
# tags with the default GITHUB_TOKEN, and tags pushed by GITHUB_TOKEN do not
# trigger `on: push` workflows. Instead it is:
#   - called by release.yml right after a successful publish that includes
#     @unraid-toolkit/mcp (workflow_call), and
#   - runnable by hand for a backfill/rebuild (workflow_dispatch).
on:
  workflow_call:
    inputs:
      version:
        description: 'MCP package version to tag the image with (e.g. 0.2.0)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'MCP package version to tag the image with (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: read

env:
  IMAGE: docker.io/mikenorth/unraid-mcp

jobs:
  docker:
    name: build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Derive semver tags from the supplied version input, plus `latest`.
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }}
            type=raw,value=latest

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
