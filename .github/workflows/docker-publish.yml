name: Publish Docker image

# Build and push the unraid-mcp image to Docker Hub when the MCP package is
# released. Changesets tags each published package as `<name>@<version>`, so a
# release of @unraid-toolkit/mcp creates a tag like `@unraid-toolkit/mcp@0.1.0`.
# The CI gate (ci.yml) still guards every PR and push to main; this workflow
# only runs for MCP releases.
on:
  push:
    tags: ['@unraid-toolkit/mcp@*']

permissions:
  contents: read

env:
  IMAGE: docker.io/mikenorth/unraid-mcp

jobs:
  docker:
    name: build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Extract the version from the `@unraid-toolkit/mcp@X.Y.Z` git tag
          # (metadata-action's type=semver can't parse the scoped tag format),
          # plus `latest` for the newest release.
          tags: |
            type=match,pattern=@(\d+\.\d+\.\d+)$,group=1
            type=match,pattern=@(\d+\.\d+)\.\d+$,group=1
            type=match,pattern=@(\d+)\.\d+\.\d+$,group=1
            type=raw,value=latest

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
